name: Daily FX Update

on:
  schedule:
    - cron: '10 2 * * 1-5'  # 한국시간 오전 11:10 (UTC 02:10), 월~금
  workflow_dispatch:          # 수동 실행 버튼도 제공

jobs:
  update-fx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FX rates
        run: python fetch_fx.py --no-push
        env:
          EXIM_AUTH_KEY: ${{ secrets.EXIM_AUTH_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fx_data.json
          git diff --staged --quiet || git commit -m "auto: FX update $(date +'%Y-%m-%d')"
          git push
