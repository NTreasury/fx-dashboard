name: Daily FX Update

on:
  schedule:
    - cron: '10 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FX rates
        run: python fetch_fx.py --no-push

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fx_data.json
          git diff --staged --quiet || git commit -m "auto: FX update $(date +'%Y-%m-%d')"
          git push
